name: Continuous Delivery

env:

  main_project_module: app

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
      - release/*
  pull_request:
    branches:
      - main
      - develop
      - release/*

jobs:
  deployment_job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Set Current Date
      - name: Set current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      # Set Repository Name As Env Variable
      - name: Set repository name as env variable
        run: echo "repository_name=$(echo '${{ github.repository }}' | awk -F '/' '{print $2}')" >> $GITHUB_ENV

      - name: Set Up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      # Create APK Debug
      - name: Build apk debug project (APK) - ${{ env.main_project_module }} module
        uses: ./.github/actions/build-signed-apk
        with:
          keystore-base64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
          keystore-alias: ${{ secrets.DEBUG_KEYSTORE_ALIAS }}
          key-pass: ${{ secrets.DEBUG_KEY_PASS }}
          keystore-password: ${{ secrets.DEBUG_KEYSTORE_PASSWORD }}
          sentry-dsn: ${{ secrets.SENTRY_DSN }}
          open-id-auth-scheme: ${{ secrets.OPEN_ID_AUTH_SCHEME }}
          open-id-type: ${{ secrets.OPEN_ID_TYPE }}
          open-id-server: ${{ secrets.OPEN_ID_SERVER }}
          open-id-client: ${{ secrets.OPEN_ID_CLIENT }}
          open-id-redirect-uri: ${{ secrets.OPEN_ID_REDIRECT_URI }}
          open-id-discovery-uri: ${{ secrets.OPEN_ID_DISCOVERY_URI }}
          open-id-authorization-url: ${{ secrets.OPEN_ID_AUTHORIZATION_URL }}
          open-id-token-url: ${{ secrets.OPEN_ID_TOKEN_URL }}
          open-id-button-text: ${{ secrets.OPEN_ID_BUTTON_TEXT }}

      - name: Locate built APK
        id: apk-path
        run: |
          echo "Searching for APKs under ${{ env.main_project_module }}/build/outputs/apk"
          find "${{ env.main_project_module }}/build/outputs/apk" -type f -name "*.apk"
          APK_PATH=$(find "${{ env.main_project_module }}/build/outputs/apk" -type f -name "*.apk" -print -quit)
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"

      # Upload Artifact Build
      - name: Upload Android artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ env.repository_name }} - Android APK - ${{ steps.date.outputs.date }}
          path: ${{ steps.apk-path.outputs.apk_path }}
