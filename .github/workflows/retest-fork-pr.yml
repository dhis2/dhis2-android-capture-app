name: Retest Fork PR

# Manually re-run the secret-dependent required checks on a fork PR.
#
# Fork pull_request runs do not receive repository secrets, so the
# code-quality / run-form-tests / deployment_job checks fail and a plain
# re-run cannot fix them. A maintainer commenting "/retest" on the PR runs
# this workflow in the BASE repo context (secrets available), checks out the
# PR head, runs those tasks, and reports check runs with the exact required
# names against the PR head SHA so the required checks can turn green.
#
# SECURITY: this executes the fork's code (Gradle build scripts, the built
# APK on BrowserStack) with secrets present. Only trigger it on PRs whose
# diff you have reviewed. Triggering is restricted to users with write/admin.

on:
  issue_comment:
    types: [created]

permissions:
  checks: write          # create/update check runs on the PR head SHA
  contents: read
  issues: write          # add reactions on the PR conversation (issue) comment
  pull-requests: read    # read PR head SHA/ref

concurrency:
  group: retest-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  authorize:
    # Only react to "/retest" comments on pull requests.
    if: ${{ github.event.issue.pull_request && startsWith(github.event.comment.body, '/retest') }}
    runs-on: ubuntu-latest
    outputs:
      authorized: ${{ steps.check.outputs.authorized }}
      head_sha: ${{ steps.check.outputs.head_sha }}
      head_ref: ${{ steps.check.outputs.head_ref }}
    steps:
      - name: Authorize and resolve PR head
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const body = (context.payload.comment.body || '').trim();
            if (body !== '/retest') {
              core.info(`Comment is not exactly "/retest" (got: "${body}"). Ignoring.`);
              core.setOutput('authorized', 'false');
              return;
            }

            // Require the commenter to have write or admin permission.
            const actor = context.payload.comment.user.login;
            const perm = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: actor,
            });
            const level = perm.data.permission; // admin | write | read | none
            if (level !== 'admin' && level !== 'write') {
              core.warning(`@${actor} has '${level}' permission; /retest requires write or admin.`);
              await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: context.payload.comment.id,
                content: 'confused',
              });
              core.setOutput('authorized', 'false');
              return;
            }

            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            core.setOutput('authorized', 'true');
            core.setOutput('head_sha', pr.data.head.sha);
            core.setOutput('head_ref', pr.data.head.ref);

            // Acknowledge the request.
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes',
            });

  retest:
    needs: authorize
    if: ${{ needs.authorize.outputs.authorized == 'true' }}
    runs-on: ubuntu-latest
    env:
      # Required-check names — MUST match the ruleset's required status checks exactly.
      CHECK_CODE_QUALITY: code-quality
      CHECK_FORM_TESTS: run-form-tests
      CHECK_DEPLOYMENT: deployment_job
    steps:
      - name: Create in-progress check runs
        id: checks
        uses: actions/github-script@v7
        with:
          script: |
            const headSha = '${{ needs.authorize.outputs.head_sha }}';
            const detailsUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const names = [
              process.env.CHECK_CODE_QUALITY,
              process.env.CHECK_FORM_TESTS,
              process.env.CHECK_DEPLOYMENT,
            ];
            const ids = {};
            for (const name of names) {
              const res = await github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name,
                head_sha: headSha,
                status: 'in_progress',
                details_url: detailsUrl,
              });
              ids[name] = res.data.id;
            }
            core.setOutput('ids', JSON.stringify(ids));

      - name: Checkout PR head
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.authorize.outputs.head_sha }}
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      # ---- code-quality (Sonar) ----
      - name: Code quality (Sonar)
        id: code_quality
        continue-on-error: true
        env:
          GIT_BRANCH: ${{ needs.authorize.outputs.head_ref }}
          GIT_BRANCH_DEST: ${{ github.event.repository.default_branch }}
          PULL_REQUEST: ${{ github.event.issue.number }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./gradlew testDebugUnitTest testDhis2DebugUnitTest testAndroidHostTest jacocoReport --stacktrace --no-daemon
          chmod +x ./scripts/sonarqube.sh
          ./scripts/sonarqube.sh

      # ---- deployment_job (signed debug APK build) ----
      - name: Decode keystore
        id: decode_keystore
        if: ${{ always() }}
        uses: timheuer/base64-to-file@dfa5a5dd38803cb4f5c3a081eeb28e8362d43e9c
        with:
          fileName: 'debug.keystore'
          encodedString: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}

      - name: Build signed debug APK
        id: deployment
        if: ${{ always() }}
        continue-on-error: true
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          DEBUG_KEYSTORE_ALIAS: ${{ secrets.DEBUG_KEYSTORE_ALIAS }}
          DEBUG_KEY_PASS: ${{ secrets.DEBUG_KEY_PASS }}
          DEBUG_KEYSTORE_PASSWORD: ${{ secrets.DEBUG_KEYSTORE_PASSWORD }}
          DEBUG_KEYSTORE_PATH: ${{ steps.decode_keystore.outputs.filePath }}
          OPEN_ID_AUTH_SCHEME: ${{ secrets.OPEN_ID_AUTH_SCHEME }}
          OPEN_ID_TYPE: ${{ secrets.OPEN_ID_TYPE }}
          OPEN_ID_SERVER: ${{ secrets.OPEN_ID_SERVER }}
          OPEN_ID_CLIENT: ${{ secrets.OPEN_ID_CLIENT }}
          OPEN_ID_REDIRECT_URI: ${{ secrets.OPEN_ID_REDIRECT_URI }}
          OPEN_ID_DISCOVERY_URI: ${{ secrets.OPEN_ID_DISCOVERY_URI }}
          OPEN_ID_AUTHORIZATION_URL: ${{ secrets.OPEN_ID_AUTHORIZATION_URL }}
          OPEN_ID_TOKEN_URL: ${{ secrets.OPEN_ID_TOKEN_URL }}
          OPEN_ID_BUTTON_TEXT: ${{ secrets.OPEN_ID_BUTTON_TEXT }}
        run: ./gradlew assembleDhis2Debug

      # ---- run-form-tests (BrowserStack) ----
      - name: Build form test APK
        id: build_form_apk
        if: ${{ always() }}
        continue-on-error: true
        run: ./gradlew :form:assembleAndroidTest --no-daemon

      - name: Run form tests (BrowserStack)
        id: form_tests
        if: ${{ always() && steps.build_form_apk.outcome == 'success' }}
        continue-on-error: true
        env:
          BROWSERSTACK_USR: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_PSW: ${{ secrets.BROWSERSTACK_PASSWORD }}
          buildTag: ${{ needs.authorize.outputs.head_ref }} - form (retest)
        run: |
          form_apk=$(find form/build/outputs -iname "*.apk" | sed -n 1p)
          export form_apk_path="${GITHUB_WORKSPACE}/${form_apk}"
          cd scripts
          chmod +x browserstackJenkinsForm.sh
          ./browserstackJenkinsForm.sh

      # ---- Conclude check runs on the PR head SHA ----
      - name: Conclude check runs
        if: ${{ always() }}
        uses: actions/github-script@v7
        env:
          CODE_QUALITY_OUTCOME: ${{ steps.code_quality.outcome }}
          DEPLOYMENT_OUTCOME: ${{ steps.deployment.outcome }}
          FORM_BUILD_OUTCOME: ${{ steps.build_form_apk.outcome }}
          FORM_TESTS_OUTCOME: ${{ steps.form_tests.outcome }}
        with:
          script: |
            const ids = JSON.parse('${{ steps.checks.outputs.ids }}' || '{}');
            const detailsUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const toConclusion = (o) => (o === 'success' ? 'success' : 'failure');

            const formOutcome =
              process.env.FORM_BUILD_OUTCOME === 'success'
                ? process.env.FORM_TESTS_OUTCOME
                : 'failure';

            const results = {
              [process.env.CHECK_CODE_QUALITY]: toConclusion(process.env.CODE_QUALITY_OUTCOME),
              [process.env.CHECK_FORM_TESTS]: toConclusion(formOutcome),
              [process.env.CHECK_DEPLOYMENT]: toConclusion(process.env.DEPLOYMENT_OUTCOME),
            };

            let allGreen = true;
            for (const [name, conclusion] of Object.entries(results)) {
              if (conclusion !== 'success') allGreen = false;
              const id = ids[name];
              if (!id) {
                core.warning(`No check run id recorded for "${name}"; skipping.`);
                continue;
              }
              await github.rest.checks.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                check_run_id: id,
                status: 'completed',
                conclusion,
                details_url: detailsUrl,
              });
            }

            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: allGreen ? '+1' : '-1',
            });
